<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Despacho | Black Concierge</title>
    <style>
        :root {
            --bg-main: #000000;
            --bg-card: #121214;
            --bg-input: #1c1c1f;
            --gold: #d4af37;
            --gold-muted: rgba(212, 175, 55, 0.2);
            --text-white: #ffffff;
            --text-muted: #a1a1aa;
            --border-subtle: #27272a;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: var(--bg-main); color: var(--text-white); padding: 20px; display: flex; justify-content: center; min-height: 100vh; }

        .dashboard-container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 24px; }

        @media (max-width: 850px) {
            .dashboard-container { grid-template-columns: 1fr; }
        }

        /* Coluna Esquerda: Feed de Pedidos */
        .orders-feed { display: flex; flex-direction: column; gap: 16px; }
        
        .feed-header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 16px 20px; border-radius: 16px; border: 1px solid var(--border-subtle); }
        .feed-header h2 { font-size: 18px; font-weight: 800; text-transform: uppercase; color: var(--gold); }
        
        .sync-btn { background: var(--gold); color: black; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; text-transform: uppercase; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .sync-btn:active { transform: scale(0.95); }

        .orders-list { display: flex; flex-direction: column; gap: 12px; max-height: 75vh; overflow-y: auto; padding-right: 4px; }
        
        /* Card de Pedido */
        .order-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 16px; transition: 0.3s; position: relative; cursor: pointer; }
        .order-card:hover { border-color: rgba(212,175,55,0.4); }
        .order-card.selected { border-color: var(--gold); background: rgba(212,175,55,0.02); }
        
        /* Estado Impresso (Bloqueado) */
        .order-card.printed-lock { border-color: #1a1a1a; background: #080809; opacity: 0.6; }
        .order-card.printed-lock .order-status-badge { background: rgba(239, 68, 68, 0.15); color: var(--danger); border-color: var(--danger); }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .client-name { font-size: 16px; font-weight: 700; color: #fff; }
        .order-status-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid rgba(34, 197, 94, 0.3); }

        .card-details { font-size: 13px; color: var(--text-muted); display: grid; gap: 4px; }
        .card-details strong { color: var(--gold); }

        /* Coluna Direita: Impressora */
        .printer-station { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; align-items: center; height: fit-content; position: sticky; top: 20px; }
        
        /* Emulação de Cupom Térmico Portátil */
        .thermal-ticket {
            background: #ffffff; color: #000000; width: 58mm; min-height: 90mm; padding: 8px;
            font-family: 'Courier New', Courier, monospace; font-size: 12px; line-height: 1.3;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); border-radius: 4px; margin-bottom: 20px;
        }
        .ticket-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 6px; margin-bottom: 6px; }
        .ticket-header h3 { font-size: 13px; font-weight: bold; }
        .ticket-header p { font-size: 9px; }
        .ticket-sec { border-bottom: 1px dashed #000; padding-bottom: 4px; margin-bottom: 4px; font-size: 11px; }
        .ticket-sec span { display: block; font-weight: bold; }
        .ticket-footer { text-align: center; font-size: 9px; margin-top: 12px; border-top: 1px dashed #000; padding-top: 4px; }

        .action-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-active { background: linear-gradient(135deg, var(--gold) 0%, #b8901c 100%); color: #000; box-shadow: 0 4px 15px rgba(212,175,55,0.25); }
        .btn-locked { background: #27272a !important; color: var(--text-muted) !important; cursor: not-allowed !important; box-shadow: none !important; border: 1px solid var(--border-subtle); }

        /* Estilos de Impressão de Hardware */
        @media print {
            body { background: #fff; padding: 0; }
            .orders-feed, .feed-header, .action-btn, .printer-station { display: none !important; }
            .printer-station { border: none; background: transparent; padding: 0; }
            .thermal-ticket { width: 58mm; max-width: 58mm; box-shadow: none !important; padding: 0; margin: 0 auto; background: #fff; color: #000; }
            @page { margin: 0; size: auto; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="orders-feed">
        <div class="feed-header">
            <h2>Pedidos na Planilha</h2>
            <button class="sync-btn" onclick="buscarDadosPlanilha()">🔄 Sincronizar</button>
        </div>
        <div class="orders-list" id="domOrdersList">
            <p style="text-align: center; color: var(--text-muted); padding: 40px 0;">Carregando banco de dados...</p>
        </div>
    </div>

    <div class="printer-station">
        <div class="thermal-ticket" id="domTicket">
            <div class="ticket-header">
                <h3>BLACK CONCIERGE</h3>
                <p>CONTROLE DE DESPACHO VIP</p>
                <p id="tkData">Data: --/--/---- --:--</p>
            </div>
            <div class="ticket-sec"><span>CLIENTE:</span><div id="tkNome">Selecione um pedido...</div></div>
            <div class="ticket-sec"><span>WHATSAPP:</span><div id="tkWhats">--</div></div>
            <div class="ticket-sec"><span>ID CARTÃO:</span><div id="tkCartao">--</div></div>
            <div class="ticket-sec"><span>ENDEREÇO:</span><div id="tkEnd">--</div></div>
            <div class="ticket-sec"><span>PEDIDO COMPLETO:</span><div id="tkItens" style="white-space: pre-wrap;">--</div></div>
            <div class="ticket-footer"><p>Muito Obrigado Pela Preferência!</p></div>
        </div>

        <button id="domPrintBtn" class="action-btn btn-locked" disabled onclick="executarImpressaoHardware()">Imprimir via Bluetooth</button>
    </div>

</div>

<script>
    // URL Estruturada para capturar o JSON da sua planilha pública automaticamente
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/12SKPvrmT-FPp_igfoAZ7XGsBPEBsP9ETwLNxW5lg_dI/gviz/tq?tqx=out:json';
    
    let cachePedidos = [];
    let pedidoSelecionadoIdx = null;

    // Inicialização automática
    window.onload = () => {
        buscarDadosPlanilha();
    };

    function buscarDadosPlanilha() {
        const listContainer = document.getElementById('domOrdersList');
        listContainer.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 40px 0;">Sincronizando com o Google Sheets...</p>';
        
        fetch(SHEET_URL)
            .then(res => res.text())
            .then(data => {
                // Remove a proteção padrão do Google para isolar o JSON puro
                const jsonString = data.substring(data.indexOf("{"), data.lastIndexOf("}") + 1);
                const json = JSON.parse(jsonString);
                const rows = json.table.rows;
                
                cachePedidos = [];
                
                // Mapeia dinamicamente as colunas baseado na engenharia de dados do seu formulário
                rows.forEach((row, index) => {
                    // Evita processar cabeçalhos ou linhas vazias indesejadas
                    if(row.c && row.c[0] && row.c[0].v !== "NOME") {
                        const nome = row.c[0] ? String(row.c[0].v) : "";
                        const whats = row.c[1] ? String(row.c[1].v) : "";
                        const pedido = row.c[2] ? String(row.c[2].v) : "";
                        const cartao = row.c[3] ? String(row.c[3].v) : "";
                        const endereco = row.c[4] ? String(row.c[4].v) : "";
                        
                        // Chave criptográfica local para travar o status de impressão de forma permanente
                        const uniqueHash = btoa(encodeURIComponent(nome + endereco + cartao)).substring(0, 16);
                        const jaImpresso = localStorage.getItem(uniqueHash) === "true";

                        cachePedidos.push({
                            nome, whats, pedido, cartao, endereco, hash: uniqueHash, impresso: jaImpresso
                        });
                    }
                });

                // Inverte a ordem para exibir os pedidos mais recentes sempre no topo do feed
                cachePedidos.reverse();
                renderizarListaPedidos();
            })
            .catch(err => {
                listContainer.innerHTML = '<p style="text-align: center; color: var(--danger); padding: 40px 0;">Erro ao conectar com a Planilha. Verifique o compartilhamento.</p>';
            });
    }

    function renderizarListaPedidos() {
        const listContainer = document.getElementById('domOrdersList');
        if(cachePedidos.length === 0) {
            listContainer.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 40px 0;">Nenhum pedido encontrado na planilha.</p>';
            return;
        }

        listContainer.innerHTML = "";
        cachePedidos.forEach((item, index) => {
            const cardClass = item.impresso ? 'order-card printed-lock' : 'order-card';
            const badgeText = item.impresso ? '🔒 IMPRESSO (BLOQUEADO)' : '🟢 PENDENTE';
            
            const html = `
                <div class="${cardClass}" id="card-item-${index}" onclick="selecionarPedido(${index})">
                    <div class="card-top">
                        <span class="client-name">${item.nome}</span>
                        <span class="order-status-badge">${badgeText}</span>
                    </div>
                    <div class="card-details">
                        <div><strong>Endereço:</strong> ${item.endereco}</div>
                        <div><strong>Cartão Black:</strong> ${item.cartao}</div>
                    </div>
                </div>
            `;
            listContainer.insertAdjacentHTML('beforeend', html);
        });

        // Mantém a seleção visual ativa se houver atualização automática
        if(pedidoSelecionadoIdx !== null) selecionarPedido(pedidoSelecionadoIdx);
    }

    function selecionarPedido(index) {
        pedidoSelecionadoIdx = index;
        const item = cachePedidos[index];

        // Remove seleção visual de todos os outros cards
        document.querySelectorAll('.order-card').forEach(c => c.classList.remove('selected'));
        
        const selectedCard = document.getElementById(`card-item-${index}`);
        if(selectedCard) selectedCard.classList.add('selected');

        // Formatação do carimbo de data no cupom físico
        const agora = new Date();
        document.getElementById('tkData').innerText = `Data: ${agora.toLocaleDateString('pt-BR')} - ${agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}`;

        // Injeta os dados limpos no Preview Térmico
        document.getElementById('tkNome').innerText = item.nome;
        document.getElementById('tkWhats').innerText = item.whats;
        document.getElementById('tkCartao').innerText = item.cartao;
        document.getElementById('tkEnd').innerText = item.endereco;
        document.getElementById('tkItens').innerText = item.pedido;

        // VALIDAÇÃO DE SEGURANÇA MÁXIMA: Se já foi impresso, destrói e bloqueia o botão de disparo
        const btn = document.getElementById('domPrintBtn');
        if(item.impresso) {
            btn.className = "action-btn btn-locked";
            btn.innerText = "🔒 JÁ IMPRESSO (BLOQUEADO)";
            btn.disabled = true;
        } else {
            btn.className = "action-btn btn-active";
            btn.innerText = "Imprimir via Bluetooth";
            btn.disabled = false;
        }
    }

    function executarImpressaoHardware() {
        if(pedidoSelecionadoIdx === null) return;
        const item = cachePedidos[pedidoSelecionadoIdx];

        if(item.impresso) {
            alert("Erro de segurança: Este pedido já foi impresso e não pode ser duplicado!");
            return;
        }

        // Envia o sinal de renderização para o spooler nativo de impressão
        window.print();

        // SALVA O TRAVAMENTO NO ARQUIVO LOCAL DO DISPOSITIVO
        localStorage.setItem(item.hash, "true");
        item.impresso = true;

        // Atualiza a interface instantaneamente aplicando o bloqueio eletrônico
        buscarDadosPlanilha();
    }
</script>

</body>
</html>
